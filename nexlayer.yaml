application:
  name: puter
  pods:
  - name: app
    # Source-built image from pipeline 19f0eb4d7b7 — built from this branch's
    # Dockerfile, so it CONTAINS the subdomain-redirect fix in
    # src/backend/server.ts + src/backend/core/http/middleware/hostRedirects.ts.
    # Pinned explicitly (not "# filled by pipeline") so the /redeploy path
    # (DeployOnly: yaml verbatim, no analyzer, no cache, no bot) deploys exactly
    # this patched image instead of the published ghcr.io/heyputer/puter:latest,
    # which lacks the patch.
    image: registry.nexlayer.io/user_01kece1xyh817dwff7wnarhkxd/puter:19f0eb4d7b7
    path: /
    # ROOT CAUSE of the in-browser ERR_SSL_PROTOCOL_ERROR (curl only saw a 302):
    # puter used Express's default `subdomain offset` of 2, so the 4-label deploy
    # host relaxed-weasel-puter.cloud.nexlayer.ai was misread as a user-site
    # subdomain and `/` 302-redirected to site.relaxed-weasel-puter.cloud.
    # nexlayer.ai — a subdomain with NO Nexlayer TLS cert, so the browser failed
    # the TLS handshake. The source fix derives the offset from config.domain so
    # the apex serves the desktop GUI directly on the same (cert-valid) host.
    #
    # Boot: write runtime config to /tmp/puter (node-writable; /opt/puter is
    # root-owned). sqlite + local S3 (fauxqs) under /tmp/puter, DynamoDB
    # in-memory — ephemeral, fine for this test deploy. Config sets
    # protocol=https + trust_proxy=1 (so req.protocol is https behind the edge,
    # else puter loops to http) and hosting domains as distinct sub-subdomains
    # (never the apex), so nothing redirects off the cert-valid apex.
    command: sh -c "mkdir -p /tmp/puter/runtime && echo  | base64 -d > /tmp/puter/config.json && export PUTER_CONFIG_PATH=/tmp/puter/config.json && exec node ./dist/src/backend/index.js"
    servicePorts:
    - 4100
    vars:
      PUTER_DEFAULT_USER: admin
      PUTER_DEFAULT_USER_PASSWORD: nexlayer2024
