application:
  name: puter
  pods:
  - name: app
    path: /
    # Built from source (Dockerfile on this branch) so the subdomain-redirect
    # fix below compiles in. No `image:` → the pipeline builds the Dockerfile.
    #
    # ROOT CAUSE of the in-browser ERR_SSL_PROTOCOL_ERROR (curl saw only a 302):
    # puter's backend used Express's default `subdomain offset` of 2. The deploy
    # host `relaxed-weasel-puter.cloud.nexlayer.ai` has 4 labels, so Express
    # reported the apex's `req.subdomains` as ['relaxed-weasel-puter','cloud'].
    # That made `createUserSubdomainRedirect` (src/backend/core/http/middleware/
    # hostRedirects.ts) treat the apex as a user-site host and 302-redirect `/`
    # to `site.relaxed-weasel-puter.cloud.nexlayer.ai` — a subdomain with NO
    # Nexlayer TLS cert, so the browser couldn't complete TLS. (It also broke the
    # root-only GUI route, which requires zero subdomains.)
    #
    # FIX (source, on this branch):
    #   1. server.ts — derive `subdomain offset` from config.domain's label
    #      count, so the apex correctly reports zero subdomains.
    #   2. hostRedirects.ts — short-circuit (serve directly, no redirect) when
    #      the request host exactly equals the apex GUI domain.
    # Result: `/` serves puter's desktop UI on the SAME (cert-valid) host.
    #
    # Boot command (string form per the redeploy schema):
    #   - Boot index.js directly (skip the `-r telemetry.js` preload — it's a
    #     standalone OTLP exporter index.js never imports; no collector here).
    #   - Write a runtime config to /tmp/puter (node-writable; /opt/puter is
    #     root-owned). Points sqlite + local S3 (fauxqs) at /tmp/puter and runs
    #     DynamoDB (dynalite) in-memory — ephemeral, fine for this test deploy.
    #   - Sets domain/protocol + all hosting domains to the deploy host
    #     (single-domain mode), so nothing ever redirects off the cert-valid host.
    command: sh -c "mkdir -p /tmp/puter/runtime && echo  | base64 -d > /tmp/puter/config.json && export PUTER_CONFIG_PATH=/tmp/puter/config.json && exec node ./dist/src/backend/index.js"
    servicePorts:
    - 4100
    vars:
      PUTER_DEFAULT_USER: admin
      PUTER_DEFAULT_USER_PASSWORD: nexlayer2024
